<!DOCTYPE html>
<html>
<head>
  <title>Donusaurus POS</title>

  <style>
    body {
      font-family: Arial;
      background:#f5f5f5;
      padding:20px;
    }

    .card {
      background:white;
      padding:20px;
      border-radius:12px;
      max-width:500px;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
    }

    button {
      margin:4px;
      padding:6px 10px;
      border-radius:6px;
      border:none;
      cursor:pointer;
    }

    .rasa button {
      background:#eee;
    }

    .add { background:#4CAF50; color:white; }
    .minus { background:#f44336; color:white; }
    .bayar { background:#FF9800; color:white; }
    .print { background:#6c63ff; color:white; }

  </style>
</head>

<body>

<div class="card">

<h2>
<img src="https://i.imgur.com/MubvKvS.png" width="30">
Donusaurus POS
</h2>

<h3>Pilih Rasa (Max 6)</h3>

<div class="rasa" id="rasaList"></div>

<p id="info">Dipilih: 0/6</p>

<button class="add" onclick="tambahKeKeranjang()">+ Tambah ke Keranjang</button>

<h3>Keranjang</h3>
<div id="cart"></div>

<h3>Total: Rp<span id="total">0</span></h3>

<select id="metode">
  <option>Cash</option>
  <option>QRIS</option>
</select>

<br><br>

<button class="bayar" onclick="checkout()">💰 Bayar</button>
<button class="print" onclick="printNota()">🖨️ Print</button>

</div>

<div id="struk" style="display:none;"></div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwCcACselUrqfBcaxrif7rVGjyJVjUGNc2N2XqSgyZMtqh8FM6Ta8iUVsz5BEDpXPzuow/exec";

const menu = [
"Abon","Blueberry","Ceres","Matcha","Tiramisu","Strawberry"
];

let pilihan = {};
let cart = [];
let lastData = null;
let lastPayload = null;

menu.forEach(r=>{
  pilihan[r]=0;
});

renderRasa();

function renderRasa(){
  let html="";
  for(let r in pilihan){
    html+=`
    <div>
      ${r}
      <button onclick="add('${r}')">+</button>
      ${pilihan[r]}
      <button onclick="minus('${r}')">-</button>
    </div>
    `;
  }
  document.getElementById("rasaList").innerHTML=html;
  updateInfo();
}

function add(r){
  if(totalDipilih()<6){
    pilihan[r]++;
    renderRasa();
  }
}

function minus(r){
  if(pilihan[r]>0){
    pilihan[r]--;
    renderRasa();
  }
}

function totalDipilih(){
  return Object.values(pilihan).reduce((a,b)=>a+b,0);
}

function updateInfo(){
  document.getElementById("info").innerText =
  "Dipilih: "+totalDipilih()+"/6";
}

function tambahKeKeranjang(){

  if(totalDipilih()===0){
    alert("Pilih rasa dulu!");
    return;
  }

  let rasaDipilih=[];
  for(let r in pilihan){
    if(pilihan[r]>0){
      rasaDipilih.push(r+" ("+pilihan[r]+"x)");
    }
  }

  let item = totalDipilih()==6 ?
    "1x Donat Box (6 pcs)" :
    "1x Donat ("+totalDipilih()+" pcs)";

  let harga = totalDipilih()==6 ? 45000 : totalDipilih()*8000;

  cart.push({
    item:item,
    rasa:rasaDipilih.join(", "),
    price:harga
  });

  pilihan={};
  menu.forEach(r=>pilihan[r]=0);

  renderRasa();
  renderCart();
}

function renderCart(){
  let html="";
  let total=0;

  cart.forEach((c,i)=>{
    total+=c.price;
    html+=`
    <div>
      ${c.item} | ${c.rasa} | Rp${c.price}
    </div>`;
  });

  document.getElementById("cart").innerHTML=html;
  document.getElementById("total").innerText=total;
}

async function checkout(){

  if(cart.length===0){
    alert("Keranjang kosong!");
    return;
  }

  let metode=document.getElementById("metode").value;
  let total=cart.reduce((s,c)=>s+c.price,0);

  let payload={
    item:cart.map(c=>c.item).join(" | "),
    detailRasa:cart.map(c=>c.rasa).join(" | "),
    harga:cart.map(c=>c.price).join(" | "),
    total:total,
    metode:metode
  };

  let res=await fetch(API_URL,{
    method:"POST",
    body:JSON.stringify(payload)
  });

  let data=await res.json();

  if(data.status==="success"){
    alert("Order berhasil!");

    window.open(data.invoice,"_blank");

    lastData=data;
    lastPayload=payload;

  }else{
    alert("Error");
  }

  cart=[];
  renderCart();
}

function printNota(){
  if(!lastData){
    alert("Belum ada transaksi!");
    return;
  }

  let struk=document.getElementById("struk");

  struk.innerHTML=`
  <div style="width:220px;font-family:Courier New;font-size:12px;">

  <center>
  <img src="https://i.imgur.com/MubvKvS.png" width="40"><br>
  Donusaurus<br>
  </center>

  <hr>

  ${lastPayload.item}<br>
  ${lastPayload.detailRasa}

  <hr>

  Total Rp${lastPayload.total}<br>
  ${lastPayload.metode}

  </div>
  `;

  struk.style.display="block";
  window.print();
  struk.style.display="none";
}

</script>

</body>
</html>
