<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donusaurus POS 🦖</title>

<style>
body{font-family:Arial;background:#f5f5f5;padding:20px;}
.box{background:white;padding:15px;margin-bottom:15px;border-radius:10px;}
button{margin:3px;padding:6px 10px;}
</style>
</head>

<body>

<h2>🦖 Donusaurus POS</h2>

<div class="box">
<h3>Pilih Tipe</h3>

<select id="tipe">
<option value="pcs">PCS</option>
<option value="box">BOX</option>
</select>

Jumlah:
<input type="number" id="qty" value="1" min="1">

</div>

<div class="box">
<h3>Pilih Rasa</h3>
<div id="rasaList"></div>
<p id="info"></p>
<button onclick="addToCart()">+ Tambah</button>
</div>

<div class="box">
<h3>Keranjang</h3>
<div id="cart"></div>

<h3>Total: Rp<span id="total">0</span></h3>

<select id="metode">
<option>Cash</option>
<option>QRIS</option>
</select>

<br><br>
<button onclick="checkout()">💰 Bayar</button>
<button onclick="printNota()">🖨️ Print</button>
</div>

<div id="struk" style="display:none;"></div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwCcACselUrqfBcaxrif7rVGjyJVjUGNc2N2XqSgyZMtqh8FM6Ta8iUVsz5BEDpXPzuow/exec";

const menu = [
"Abon","Blueberry","Caramel","Ceres Jadul","Cheese",
"Choco Ceres","Choco Cookies","Choco Crunch","Choco Peanut",
"Creme Brule","Gula Halus","Lotus Biscoff","Matcha Crunch",
"Oreo","Original Glaze","Pistachio","Red Velvet","Srikaya",
"Strawberry Sprinkle","Tiramisu Almond"
];

let pilihan = {};
let cart = [];
let lastData = null;
let lastPayload = null;

menu.forEach(r=>pilihan[r]=0);

function renderRasa(){
let html="";
menu.forEach(r=>{
html+=`
${r}
<button onclick="add('${r}')">+</button>
${pilihan[r]}
<button onclick="minus('${r}')">-</button><br>`;
});
document.getElementById("rasaList").innerHTML=html;
updateInfo();
}

// 🔥 CONFIG UTAMA (INI YANG KAMU MAU)
function getConfig(){

let tipe = document.getElementById("tipe").value;
let qty = parseInt(document.getElementById("qty").value);

let totalPcs = 0;
let harga = 0;

if(tipe==="pcs"){
  totalPcs = qty;
  harga = 8000 * qty;
}

if(tipe==="box"){
  totalPcs = qty * 6;

  if(qty==1){
    harga = 45000;
  }else{
    harga = 42500 * qty;
  }
}

return {tipe, qty, totalPcs, harga};
}

function add(r){
if(totalDipilih()<getConfig().totalPcs){
pilihan[r]++;
renderRasa();
}
}

function minus(r){
if(pilihan[r]>0){
pilihan[r]--;
renderRasa();
}
}

function totalDipilih(){
return Object.values(pilihan).reduce((a,b)=>a+b,0);
}

function updateInfo(){
let max=getConfig().totalPcs;
let total=totalDipilih();
document.getElementById("info").innerText =
`Dipilih ${total}/${max} | Sisa ${max-total}`;
}

function addToCart(){

let cfg = getConfig();

if(totalDipilih()!==cfg.totalPcs){
alert("Jumlah rasa belum sesuai!");
return;
}

let rasaDipilih=[];
for(let r in pilihan){
if(pilihan[r]>0){
rasaDipilih.push(r+" ("+pilihan[r]+"x)");
}
}

let label = cfg.tipe==="pcs"
  ? cfg.qty+" pcs"
  : cfg.qty+" box ("+cfg.totalPcs+" pcs)";

cart.push({
item: label,
rasa: rasaDipilih.join(", "),
price: cfg.harga
});

menu.forEach(r=>pilihan[r]=0);
renderRasa();
renderCart();
}

function renderCart(){
let html="";
let total=0;

cart.forEach((c,i)=>{
total+=c.price;
html+=`
${c.item} | Rp${c.price}
<br>${c.rasa}
<button onclick="hapus(${i})">❌</button><br><br>`;
});

document.getElementById("cart").innerHTML=html;
document.getElementById("total").innerText=total;
}

function hapus(i){
cart.splice(i,1);
renderCart();
}

async function checkout(){

if(cart.length===0){
alert("Keranjang kosong!");
return;
}

let metode=document.getElementById("metode").value;
let total=cart.reduce((s,c)=>s+c.price,0);

let payload={
item:cart.map(c=>c.item).join(" | "),
detailRasa:cart.map(c=>c.rasa).join(" | "),
harga:cart.map(c=>c.price).join(" | "),
total:total,
metode:metode
};

let res=await fetch(API_URL,{
method:"POST",
body:JSON.stringify(payload)
});

let data=await res.json();

if(data.status==="success"){
window.open(data.invoice,"_blank");
lastData=data;
lastPayload=payload;
}

cart=[];
renderCart();
}

function printNota(){
if(!lastData){ alert("Belum ada transaksi"); return; }

let s=document.getElementById("struk");

s.innerHTML=`
<div style="width:220px;font-family:Courier New;font-size:12px;">
<center>
<img src="https://i.imgur.com/MubvKvS.png" width="40"><br>
Donusaurus
</center>
<hr>
${lastPayload.item}<br>
${lastPayload.detailRasa}
<hr>
Total Rp${lastPayload.total}<br>
${lastPayload.metode}
</div>`;

s.style.display="block";
window.print();
s.style.display="none";
}

renderRasa();

</script>

</body>
</html>
