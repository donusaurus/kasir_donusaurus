<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donusaurus POS 🦖</title>

<style>
body{
  font-family:Arial;
  background:#f5f5f5;
  padding:20px;
}

.box{
  background:white;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
}
</style>

</head>

<body>

<h2>🦖 Donusaurus POS</h2>

<div class="box">
<select id="tipe">
<option value="pcs">PCS</option>
<option value="box">BOX</option>
</select>

<input type="number" id="qty" value="1" min="1">
</div>

<div class="box">
<div id="rasaList"></div>
<p id="info"></p>
<button onclick="addToCart()">Tambah</button>
</div>

<div class="box">
<div id="cart"></div>
<h3>Total: Rp<span id="total">0</span></h3>

<select id="metode">
<option>Cash</option>
<option>QRIS</option>
</select>

<br><br>
<button onclick="checkout()">Bayar</button>
<button onclick="printNota()">Print</button>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwCcACselUrqfBcaxrif7rVGjyJVjUGNc2N2XqSgyZMtqh8FM6Ta8iUVsz5BEDpXPzuow/exec";

let cart = [];
let lastData = null;
let lastPayload = null;

function checkout(){

let total = cart.reduce((s,c)=>s+c.price,0);

let payload={
item:"Test Order",
detailRasa:"-",
harga:"10000",
total:total,
metode:"Cash"
};

fetch(API_URL,{
method:"POST",
body:JSON.stringify(payload)
})
.then(res=>res.json())
.then(data=>{
lastData=data;
lastPayload=payload;
alert("Order berhasil!");
});

}

function printNota(){

if(!lastData){
alert("Belum ada transaksi!");
return;
}

// 🔥 QR = LINK INVOICE
let qrURL = "https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=" + 
encodeURIComponent(lastData.invoice);

let win=window.open("","","width=300,height=700");

win.document.write(`
<html>
<body style="font-family:monospace; font-size:12px; text-align:center;">

Donusaurus<br>
<br>

Order ID: ${lastData.orderID}<br>
<br>

Thank you<br>
@donusaurus<br><br>

<img src="${qrURL}" width="80">

<script>
window.onload = function(){
  setTimeout(function(){
    window.print();
  }, 500);
}
<\/script>

</body>
</html>
`);

win.document.close();
}

</script>

</body>
</html>
