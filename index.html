<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Donusaurus POS 🦖</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f5f5f5;
}

button {
  margin: 4px;
  padding: 10px;
  font-size: 16px;
}

.qty-btn {
  font-size: 18px;
  padding: 6px 12px;
}

.box {
  margin: 20px auto;
  padding: 20px;
  background: white;
  width: 90%;
  max-width: 500px;
  border-radius: 10px;
}

</style>
</head>

<body>

<h1>🦖 Donusaurus POS</h1>

<div class="box">
  <h3>Pilih Jenis</h3>
  <select id="jenis">
    <option value="1">1 pcs</option>
    <option value="3">3 pcs</option>
    <option value="6">Box (6 pcs)</option>
  </select>

  <h3>Jumlah</h3>
  <input type="number" id="jumlah" value="1" min="1">
</div>

<div class="box">
  <h3>Pilih Rasa</h3>
  <div id="rasaList"></div>

  <p id="summary"></p>

  <button onclick="addToCart()">+ Tambah ke Keranjang</button>
</div>

<div class="box">
  <h3>🛒 Keranjang</h3>
  <div id="cart"></div>
  <h2 id="total">Total: Rp0</h2>

  <h3>Metode Pembayaran</h3>
  <select id="metode">
    <option>Cash</option>
    <option>QRIS</option>
    <option>GoFood</option>
    <option>GrabFood</option>
    <option>ShopeeFood</option>
  </select>

  <br><br>
  <button onclick="checkout()">💰 Bayar</button>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwCcACselUrqfBcaxrif7rVGjyJVjUGNc2N2XqSgyZMtqh8FM6Ta8iUVsz5BEDpXPzuow/exec";

const rasaList = [
"Abon","Blueberry","Caramel","Ceres Jadul","Cheese",
"Choco Ceres","Choco Cookies","Choco Crunch","Choco Peanut",
"Creme Brule","Gula Halus","Lotus Biscoff","Matcha Crunch",
"Oreo","Original Glaze","Pistachio","Red Velvet","Srikaya",
"Strawberry Sprinkle","Tiramisu Almond"
];

let selected = {};
let cart = [];

function renderRasa() {
  let html = "";
  rasaList.forEach(r => {
    html += `
    <div>
      ${r}
      <button class="qty-btn" onclick="add('${r}')">+</button>
      <button class="qty-btn" onclick="minus('${r}')">-</button>
      <span id="qty-${r}">0</span>
    </div>
    `;
  });
  document.getElementById("rasaList").innerHTML = html;
}

function add(r) {
  selected[r] = (selected[r] || 0) + 1;
  updateUI();
}

function minus(r) {
  if (selected[r]) selected[r]--;
  updateUI();
}

function updateUI() {
  let total = 0;
  for (let r in selected) {
    document.getElementById("qty-"+r).innerText = selected[r] || 0;
    total += selected[r];
  }

  let max = getTotalPcs();
  document.getElementById("summary").innerText =
    "Dipilih: " + total + "/" + max + " | Sisa: " + (max-total);
}

function getTotalPcs() {
  let jenis = parseInt(document.getElementById("jenis").value);
  let jumlah = parseInt(document.getElementById("jumlah").value);
  return jenis * jumlah;
}

function getPrice(totalPcs) {
  if (totalPcs >= 12) return 42500 * (totalPcs/6);
  if (totalPcs >= 6) return 45000 * (totalPcs/6);
  if (totalPcs >= 3) return 24000;
  return 8000;
}

function addToCart() {
  let totalPcs = getTotalPcs();
  let selectedTotal = Object.values(selected).reduce((a,b)=>a+b,0);

  if (selectedTotal !== totalPcs) {
    alert("Jumlah rasa belum sesuai!");
    return;
  }

  let rasaText = Object.entries(selected)
    .map(([k,v]) => k+" ("+v+"x)")
    .join(", ");

  let price = getPrice(totalPcs);

  cart.push({
    item: totalPcs + " pcs",
    rasa: rasaText,
    price: price
  });

  selected = {};
  renderRasa();
  updateCart();
}

function updateCart() {
  let html = "";
  let total = 0;

  cart.forEach((c,i)=>{
    total += c.price;
    html += `<div>${c.item} | ${c.rasa} | Rp${c.price}
    <button onclick="remove(${i})">❌</button></div>`;
  });

  document.getElementById("cart").innerHTML = html;
  document.getElementById("total").innerText = "Total: Rp"+total;
}

function remove(i) {
  cart.splice(i,1);
  updateCart();
}

async function checkout() {
  if (cart.length === 0) {
    alert("Keranjang kosong!");
    return;
  }

  let metode = document.getElementById("metode").value;
  let total = cart.reduce((sum, c) => sum + c.price, 0);

  try {
    let res = await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({
        item: cart.map(c => c.item).join(" | "),
        detailRasa: cart.map(c => c.rasa).join(" | "),
        addon: "-",
        total: total,
        metode: metode
      })
    });

    let data = await res.json();
    console.log(data);

    if (data.status === "success") {
      alert("Order berhasil!\n#" + data.orderID + "/" + data.kodeUnik);
      window.open(data.invoice, "_blank");
    } else {
      alert("Struk gagal dibuat:\n" + data.message);
    }

  } catch (err) {
    alert("ERROR:\n" + err);
  }

  cart = [];
  updateCart();
}

renderRasa();

</script>

</body>
</html>
