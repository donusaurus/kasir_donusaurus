<!DOCTYPE html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donusaurus POS</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

:root{
  --bg:#fff7ed;
  --bg-soft:#fff1df;
  --panel:#fffaf4;
  --panel-strong:#ffffff;
  --ink:#28170d;
  --muted:#806a58;
  --line:#efd8bd;
  --brand:#f97316;
  --brand-dark:#c84f0a;
  --accent:#0f766e;
  --accent-soft:#e4f5f1;
  --danger:#b42318;
  --danger-soft:#fff0eb;
  --shadow:0 14px 34px rgba(152,81,18,.11);
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:"Plus Jakarta Sans", Arial, sans-serif;
  font-size:14px;
  line-height:1.4;
  background:
    radial-gradient(circle at top left, rgba(249,115,22,.16), transparent 30%),
    linear-gradient(180deg,#fffaf4 0%,var(--bg) 44%,#fff 100%);
  color:var(--ink);
}

button,input,select{font:inherit}
button{border:0;cursor:pointer}

.app{
  max-width:1180px;
  margin:0 auto;
  padding:16px;
}

.topbar{
  display:grid;
  grid-template-columns:auto 1fr auto;
  align-items:center;
  gap:12px;
  margin-bottom:16px;
}

.menu-button{
  width:40px;
  height:40px;
  display:grid;
  place-items:center;
  border-radius:8px;
  background:var(--panel);
  border:1px solid var(--line);
  box-shadow:var(--shadow);
}

.menu-button span{
  width:18px;
  height:2px;
  display:block;
  background:var(--ink);
  margin:2px 0;
  border-radius:999px;
}

.brand h1{
  margin:0;
  font-size:22px;
  line-height:1.15;
  font-weight:800;
}

.brand p{
  margin:4px 0 0;
  color:var(--muted);
  font-size:12px;
  font-weight:600;
}

.status-pill{
  background:var(--accent-soft);
  color:var(--accent);
  padding:8px 11px;
  border-radius:999px;
  font-weight:800;
  font-size:12px;
  white-space:nowrap;
}

.layout{
  display:grid;
  grid-template-columns:minmax(0,1fr) 360px;
  gap:16px;
  align-items:start;
}

.panel{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:8px;
  box-shadow:var(--shadow);
  padding:14px;
  margin-bottom:14px;
}

.panel-title{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:12px;
}

.panel-title h2{
  margin:0;
  font-size:15px;
  line-height:1.2;
  font-weight:800;
}

.hint{
  color:var(--muted);
  font-size:12px;
  font-weight:600;
}

.form-grid{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:12px;
}

.field{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.field label{
  color:var(--muted);
  font-size:11px;
  font-weight:700;
  text-transform:uppercase;
}

.field input,.field select{
  width:100%;
  min-height:38px;
  border:1px solid var(--line);
  border-radius:8px;
  background:var(--panel-strong);
  color:var(--ink);
  padding:8px 10px;
  outline:none;
  font-size:13px;
}

.field input:focus,.field select:focus{
  border-color:var(--brand);
  box-shadow:0 0 0 3px rgba(249,115,22,.16);
}

.order-grid{
  display:grid;
  grid-template-columns:180px 1fr;
  gap:12px;
}

.summary-strip{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-top:12px;
}

.summary-cell{
  background:var(--bg-soft);
  border:1px solid var(--line);
  border-radius:8px;
  padding:9px;
}

.summary-cell small{
  display:block;
  color:var(--muted);
  font-size:11px;
  font-weight:700;
  text-transform:uppercase;
}

.summary-cell b{
  display:block;
  margin-top:4px;
  font-size:15px;
  line-height:1.2;
}

.progress{
  height:8px;
  background:#f4ddc2;
  border-radius:999px;
  overflow:hidden;
  margin-top:11px;
}

.progress span{
  display:block;
  height:100%;
  width:0;
  background:linear-gradient(90deg,var(--brand),#fbbf24);
  transition:width .15s ease;
}

.flavor-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(190px,1fr));
  gap:9px;
}

.flavor-card{
  display:grid;
  grid-template-columns:1fr auto;
  gap:8px;
  align-items:center;
  min-height:48px;
  padding:9px;
  border:1px solid var(--line);
  border-radius:8px;
  background:var(--panel-strong);
}

.flavor-name{
  font-size:13px;
  font-weight:700;
  line-height:1.25;
}

.stepper{
  display:grid;
  grid-template-columns:30px 26px 30px;
  align-items:center;
  gap:4px;
}

.stepper button{
  width:30px;
  height:30px;
  border-radius:8px;
  background:#fff0dc;
  color:var(--ink);
  font-weight:800;
  font-size:14px;
}

.stepper button:hover{background:#fed7aa}
.count{text-align:center;font-weight:800;font-size:13px}

.actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:12px;
}

.btn{
  min-height:38px;
  border-radius:8px;
  padding:9px 13px;
  font-weight:800;
  background:#fff0dc;
  color:var(--ink);
  font-size:13px;
}

.btn-primary{background:var(--brand);color:white}
.btn-primary:hover{background:var(--brand-dark)}
.btn-danger{background:var(--danger-soft);color:var(--danger)}

.addon-check{
  display:grid;
  grid-template-columns:auto 1fr 130px;
  gap:10px;
  align-items:center;
  background:var(--panel-strong);
  border:1px solid var(--line);
  border-radius:8px;
  padding:10px;
}

.addon-check input[type="checkbox"]{
  width:18px;
  height:18px;
  accent-color:var(--brand);
}

.addon-name b{
  display:block;
  font-size:13px;
}

.addon-name span{
  color:var(--muted);
  font-size:12px;
}

.addon-rows{
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-top:10px;
}

.addon-row{
  display:grid;
  grid-template-columns:minmax(0,1fr) 110px 78px auto;
  gap:8px;
  align-items:end;
}

.addon-total{
  margin-top:10px;
  color:var(--muted);
  font-size:13px;
  font-weight:700;
}

.cart-panel{
  position:sticky;
  top:14px;
}

.cart-list{
  display:flex;
  flex-direction:column;
  gap:10px;
  min-height:60px;
}

.empty-cart{
  border:1px dashed var(--line);
  border-radius:8px;
  color:var(--muted);
  padding:16px;
  text-align:center;
  font-size:13px;
}

.cart-item,.addon-preview{
  border:1px solid var(--line);
  border-radius:8px;
  background:var(--panel-strong);
  padding:11px;
}

.cart-head{
  display:flex;
  justify-content:space-between;
  gap:10px;
  align-items:flex-start;
}

.cart-head b{
  line-height:1.25;
  font-size:13px;
}

.cart-price{
  white-space:nowrap;
  font-weight:800;
  font-size:13px;
}

.cart-rasa,.addon-preview ul{
  margin-top:8px;
  color:var(--muted);
  font-size:12px;
  line-height:1.4;
}

.addon-preview ul{
  margin-bottom:0;
  padding-left:18px;
}

.cart-remove{
  margin-top:10px;
  background:transparent;
  color:var(--danger);
  padding:0;
  font-weight:800;
  font-size:12px;
}

.total-box{
  border-top:1px solid var(--line);
  margin-top:12px;
  padding-top:12px;
}

.total-line{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}

.total-line span{color:var(--muted);font-weight:700;font-size:13px}
.total-line b{font-size:21px;line-height:1.1}
.pay-btn{width:100%;margin-top:12px;min-height:44px;font-size:14px}

.success-box{
  background:#fff7ed;
  border:1px solid #fed7aa;
  border-radius:8px;
  margin-top:14px;
  padding:13px;
}

.success-title{margin:0 0 6px;font-size:15px;line-height:1.2}
.success-note{margin:0;color:var(--muted);font-size:12px}
.success-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:11px}
.qr{display:block;width:132px;height:132px;margin-top:11px;border:7px solid white;border-radius:8px}

.drawer-backdrop{
  position:fixed;
  inset:0;
  background:rgba(40,23,13,.28);
  opacity:0;
  pointer-events:none;
  transition:.18s ease;
  z-index:10;
}

.drawer{
  position:fixed;
  top:0;
  left:0;
  width:min(340px,88vw);
  height:100%;
  background:var(--panel);
  box-shadow:18px 0 45px rgba(40,23,13,.18);
  transform:translateX(-100%);
  transition:.18s ease;
  z-index:11;
  padding:18px;
  overflow:auto;
}

.drawer-open .drawer-backdrop{opacity:1;pointer-events:auto}
.drawer-open .drawer{transform:translateX(0)}

.drawer-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  margin-bottom:16px;
}

.drawer-head h2{margin:0;font-size:16px}
.drawer-close{background:transparent;font-size:20px;color:var(--muted)}

.menu-card{
  display:flex;
  justify-content:space-between;
  align-items:center;
  width:100%;
  gap:12px;
  background:var(--panel-strong);
  border:1px solid var(--line);
  border-radius:8px;
  padding:12px;
  margin-bottom:10px;
  text-align:left;
}

.menu-card b{font-size:13px}
.menu-card span{font-size:12px;color:var(--muted);font-weight:700}
.history-list{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.history-item{background:white;border:1px solid var(--line);border-radius:8px;padding:10px;font-size:12px}
.history-item b{display:block;font-size:13px;margin-bottom:3px}
.history-item a{color:var(--brand-dark);font-weight:800;text-decoration:none}

@media (max-width:900px){
  .layout{grid-template-columns:1fr}
  .cart-panel{position:static}
  .form-grid{grid-template-columns:1fr}
  .order-grid{grid-template-columns:1fr 1fr}
}

@media (max-width:640px){
  .app{padding:14px}
  .topbar{grid-template-columns:auto 1fr}
  .status-pill{grid-column:1 / -1;width:max-content}
  .brand h1{font-size:21px}
  .panel{padding:13px}
  .summary-strip{grid-template-columns:1fr}
  .flavor-grid{grid-template-columns:1fr}
  .addon-check{grid-template-columns:auto 1fr}
  .addon-check .field{grid-column:1 / -1}
  .addon-row{grid-template-columns:1fr 88px 68px}
  .addon-row .remove-addon{grid-column:1 / -1}
}
</style>
</head>

<body>
<div id="drawerRoot">
  <div class="drawer-backdrop" onclick="closeMenu()"></div>
  <aside class="drawer">
    <div class="drawer-head">
      <h2>Menu</h2>
      <button class="drawer-close" onclick="closeMenu()">x</button>
    </div>

    <button class="menu-card" onclick="newTransaction()">
      <b>Transaksi Baru</b>
      <span>Reset kasir</span>
    </button>

    <button class="menu-card" onclick="showHistory()">
      <b>Histori Pembelian</b>
      <span id="historyTotalBadge">Rp0</span>
    </button>

    <div id="historyPanel" class="history-list"></div>
  </aside>
</div>

<main class="app">
  <header class="topbar">
    <button class="menu-button" onclick="openMenu()" aria-label="Buka menu">
      <span></span><span></span><span></span>
    </button>
    <div class="brand">
      <h1>Donusaurus POS</h1>
      <p>Sungai Jawi</p>
    </div>
    <div class="status-pill" id="todaySales">Hari ini Rp0</div>
  </header>

  <div class="layout">
    <section>
      <div class="panel">
        <div class="panel-title"><h2>Data Order</h2></div>
        <div class="form-grid">
          <div class="field">
            <label for="nama">Customer</label>
            <input type="text" id="nama" placeholder="Nama customer">
          </div>
          <div class="field">
            <label for="sumber">Sumber</label>
            <select id="sumber" onchange="autoMetode()">
              <option value="Walk-in">Walk-in</option>
              <option value="GoFood">GoFood</option>
              <option value="GrabFood">GrabFood</option>
              <option value="ShopeeFood">ShopeeFood</option>
              <option value="DM">DM</option>
            </select>
          </div>
          <div class="field">
            <label for="metode">Metode</label>
            <select id="metode">
              <option>Cash</option>
              <option>QRIS</option>
              <option>Transfer</option>
              <option>Non-Cash (Platform)</option>
            </select>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">
          <h2>Produk</h2>
          <span class="hint">Pilih tipe dan jumlah</span>
        </div>
        <div class="order-grid">
          <div class="field">
            <label for="tipe">Tipe</label>
            <select id="tipe" onchange="renderRasa()">
              <option value="pcs">PCS</option>
              <option value="box">BOX</option>
            </select>
          </div>
          <div class="field">
            <label for="qty">Jumlah</label>
            <input type="number" id="qty" value="1" min="1" onchange="renderRasa()" oninput="renderRasa()">
          </div>
        </div>
        <div class="summary-strip">
          <div class="summary-cell"><small>Kebutuhan</small><b><span id="targetPcs">1</span> pcs</b></div>
          <div class="summary-cell"><small>Dipilih</small><b><span id="pickedPcs">0</span> pcs</b></div>
          <div class="summary-cell"><small>Harga</small><b>Rp<span id="previewHarga">8.000</span></b></div>
        </div>
        <div class="progress"><span id="progressBar"></span></div>
      </div>

      <div class="panel">
        <div class="panel-title">
          <h2>Pilih Rasa</h2>
          <span class="hint" id="info">Dipilih 0/1</span>
        </div>
        <div id="rasaList" class="flavor-grid"></div>
        <div class="actions">
          <button class="btn btn-primary" onclick="addToCart()">Tambah ke Keranjang</button>
          <button class="btn" onclick="resetPilihan()">Reset Rasa</button>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">
          <h2>Add On</h2>
          <span class="hint">Opsional</span>
        </div>
        <div class="addon-check">
          <input type="checkbox" id="birthdayPackaging" onchange="renderCart()">
          <div class="addon-name">
            <b>Birthday Packaging</b>
            <span>Lilin 2 Pcs, Topper, Greeting Card dan Pita</span>
          </div>
          <div class="field">
            <label for="birthdayPrice">Harga</label>
            <input type="number" id="birthdayPrice" value="0" min="0" oninput="renderCart()">
          </div>
        </div>

        <div id="addonRows" class="addon-rows"></div>
        <div class="actions">
          <button class="btn" onclick="addManualAddon()">Tambah Add On</button>
        </div>
        <div class="addon-total">Total Add On: Rp<span id="addonTotal">0</span></div>
      </div>
    </section>

    <aside class="panel cart-panel">
      <div class="panel-title"><h2>Keranjang</h2></div>
      <div id="cart" class="cart-list"></div>
      <div id="addonPreview"></div>
      <div class="total-box">
        <div class="total-line">
          <span>Total</span>
          <b>Rp<span id="total">0</span></b>
        </div>
        <button id="payBtn" class="btn btn-primary pay-btn" onclick="checkout()">Bayar</button>
      </div>
      <div id="afterCheckout"></div>
    </aside>
  </div>
</main>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwCcACselUrqfBcaxrif7rVGjyJVjUGNc2N2XqSgyZMtqh8FM6Ta8iUVsz5BEDpXPzuow/exec";
const STRUK_URL = "https://donusaurus.github.io/struk_donusaurus/";

const menu = [
  "Abon","Blueberry","Caramel","Ceres Jadul","Cheese",
  "Choco Ceres","Choco Cookies","Choco Crunch","Choco Peanut",
  "Creme Brule","Gula Halus","Lotus Biscoff","Matcha Crunch",
  "Oreo","Original Glaze","Pistachio","Red Velvet","Srikaya",
  "Strawberry Sprinkle","Tiramisu Almond"
];

let pilihan = {};
let cart = [];
let manualAddOns = [];
let isCheckingOut = false;

menu.forEach(r => pilihan[r] = 0);
window.addEventListener("load", function(){
  renderRasa();
  renderManualAddOns();
  renderCart();
  refreshHistoryBadge();
});

function toNumber(n){
  return Number(String(n || "0").replace(/[^\d]/g, "")) || 0;
}

function rp(n){
  return toNumber(n).toLocaleString("id-ID");
}

function orderNo(n){
  return String(n || "").replace(/[^\d]/g, "").padStart(3, "0");
}

function escapeHtml(value){
  return String(value || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function openMenu(){
  document.getElementById("drawerRoot").classList.add("drawer-open");
  refreshHistoryBadge();
}

function closeMenu(){
  document.getElementById("drawerRoot").classList.remove("drawer-open");
}

function newTransaction(){
  document.getElementById("nama").value = "";
  document.getElementById("sumber").value = "Walk-in";
  document.getElementById("metode").value = "Cash";
  document.getElementById("tipe").value = "pcs";
  document.getElementById("qty").value = 1;
  document.getElementById("birthdayPackaging").checked = false;
  document.getElementById("birthdayPrice").value = 0;
  cart = [];
  manualAddOns = [];
  resetPilihan();
  renderManualAddOns();
  renderCart();
  document.getElementById("afterCheckout").innerHTML = "";
  closeMenu();
}

async function refreshHistoryBadge(){
  try{
    let res = await fetch(API_URL + "?action=history");
    let data = await res.json();
    document.getElementById("historyTotalBadge").innerText = "Rp" + rp(data.totalToday);
    document.getElementById("todaySales").innerText = "Hari ini Rp" + rp(data.totalToday);
  }catch(err){
    document.getElementById("historyTotalBadge").innerText = "Belum sinkron";
  }
}

async function showHistory(){
  const panel = document.getElementById("historyPanel");
  panel.innerHTML = `<div class="history-item">Memuat histori...</div>`;

  try{
    let res = await fetch(API_URL + "?action=history");
    let data = await res.json();
    document.getElementById("historyTotalBadge").innerText = "Rp" + rp(data.totalToday);
    document.getElementById("todaySales").innerText = "Hari ini Rp" + rp(data.totalToday);

    if(!data.items || data.items.length === 0){
      panel.innerHTML = `<div class="history-item">Belum ada transaksi</div>`;
      return;
    }

    panel.innerHTML = data.items.map(item => `
      <div class="history-item">
        <b>#${orderNo(item.orderID)} / ${escapeHtml(item.kodeUnik)} - Rp${rp(item.total)}</b>
        ${escapeHtml(item.nama || "-")} (${escapeHtml(item.sumber || "-")})<br>
        ${escapeHtml(item.tanggal)} ${escapeHtml(item.jam)}<br>
        <a href="${escapeHtml(item.linkStruk)}" target="_blank">Buka struk</a>
      </div>
    `).join("");
  }catch(err){
    panel.innerHTML = `<div class="history-item">Gagal memuat histori</div>`;
  }
}

function renderRasa(){
  let html = "";

  menu.forEach(r => {
    html += `
      <div class="flavor-card">
        <div class="flavor-name">${r}</div>
        <div class="stepper">
          <button type="button" onclick="minus('${r}')">-</button>
          <div class="count">${pilihan[r]}</div>
          <button type="button" onclick="add('${r}')">+</button>
        </div>
      </div>
    `;
  });

  document.getElementById("rasaList").innerHTML = html;
  updateInfo();
}

function getConfig(){
  let tipe = document.getElementById("tipe").value;
  let qty = parseInt(document.getElementById("qty").value) || 1;

  if(qty < 1){
    qty = 1;
    document.getElementById("qty").value = 1;
  }

  let totalPcs = 0;
  let harga = 0;

  if(tipe === "pcs"){
    totalPcs = qty;
    harga = 8000 * qty;
  }

  if(tipe === "box"){
    totalPcs = qty * 6;
    harga = qty === 1 ? 45000 : 42500 * qty;
  }

  return { tipe, qty, totalPcs, harga };
}

function add(r){
  if(totalDipilih() < getConfig().totalPcs){
    pilihan[r]++;
    renderRasa();
  }
}

function minus(r){
  if(pilihan[r] > 0){
    pilihan[r]--;
    renderRasa();
  }
}

function resetPilihan(){
  menu.forEach(r => pilihan[r] = 0);
  renderRasa();
}

function totalDipilih(){
  return Object.values(pilihan).reduce((a,b) => a + b, 0);
}

function updateInfo(){
  let cfg = getConfig();
  let total = totalDipilih();
  let sisa = cfg.totalPcs - total;
  let progress = cfg.totalPcs > 0 ? Math.min(100, (total / cfg.totalPcs) * 100) : 0;

  document.getElementById("info").innerText = `Dipilih ${total}/${cfg.totalPcs} | Sisa ${sisa}`;
  document.getElementById("targetPcs").innerText = cfg.totalPcs;
  document.getElementById("pickedPcs").innerText = total;
  document.getElementById("previewHarga").innerText = rp(cfg.harga);
  document.getElementById("progressBar").style.width = progress + "%";
}

function addToCart(){
  let cfg = getConfig();

  if(totalDipilih() !== cfg.totalPcs){
    alert("Jumlah rasa belum sesuai!");
    return;
  }

  let rasaDipilih = [];

  for(let r in pilihan){
    if(pilihan[r] > 0){
      rasaDipilih.push(r + " (" + pilihan[r] + "x)");
    }
  }

  let label = cfg.tipe === "pcs"
    ? cfg.qty + "x Pcs Donat"
    : cfg.qty + "x Box Donat (6 pcs)";

  cart.push({
    item: label,
    rasa: rasaDipilih.join(", "),
    price: cfg.harga,
    pcs: cfg.totalPcs
  });

  menu.forEach(r => pilihan[r] = 0);
  document.getElementById("afterCheckout").innerHTML = "";
  renderRasa();
  renderCart();
}

function addManualAddon(){
  manualAddOns.push({ desc: "", price: 0, qty: 1 });
  renderManualAddOns();
}

function updateManualAddon(index, field, value){
  manualAddOns[index][field] = field === "desc" ? value : toNumber(value);
  renderCart();
}

function removeManualAddon(index){
  manualAddOns.splice(index, 1);
  renderManualAddOns();
  renderCart();
}

function renderManualAddOns(){
  const rows = document.getElementById("addonRows");
  rows.innerHTML = manualAddOns.map((item, index) => `
    <div class="addon-row">
      <div class="field">
        <label>Deskripsi</label>
        <input type="text" value="${escapeHtml(item.desc)}" placeholder="Contoh: Paper Bag" oninput="updateManualAddon(${index}, 'desc', this.value)">
      </div>
      <div class="field">
        <label>Harga</label>
        <input type="number" value="${item.price}" min="0" oninput="updateManualAddon(${index}, 'price', this.value)">
      </div>
      <div class="field">
        <label>Qty</label>
        <input type="number" value="${item.qty}" min="1" oninput="updateManualAddon(${index}, 'qty', this.value)">
      </div>
      <button class="btn btn-danger remove-addon" onclick="removeManualAddon(${index})">Hapus</button>
    </div>
  `).join("");
}

function getAddOnItems(){
  const items = [];
  const birthdayChecked = document.getElementById("birthdayPackaging").checked;
  const birthdayPrice = toNumber(document.getElementById("birthdayPrice").value);

  if(birthdayChecked){
    items.push({
      desc: "Birthday Packaging - Lilin 2 Pcs, Topper, Greeting Card dan Pita",
      price: birthdayPrice,
      qty: 1,
      subtotal: birthdayPrice
    });
  }

  manualAddOns.forEach(item => {
    const desc = String(item.desc || "").trim();
    const qty = Math.max(1, toNumber(item.qty) || 1);
    const price = toNumber(item.price);
    if(desc){
      items.push({ desc, price, qty, subtotal: price * qty });
    }
  });

  return items;
}

function getAddOnTotal(){
  return getAddOnItems().reduce((sum, item) => sum + item.subtotal, 0);
}

function formatAddOns(){
  const items = getAddOnItems();
  if(items.length === 0) return "-";
  return items.map(item => `${item.desc} (${item.qty}x) @Rp${rp(item.price)} = Rp${rp(item.subtotal)}`).join(" | ");
}

function renderCart(){
  let html = "";
  let donutTotal = 0;

  if(cart.length === 0){
    html = `<div class="empty-cart">Belum ada item</div>`;
  }else{
    cart.forEach((c, i) => {
      donutTotal += c.price;
      html += `
        <div class="cart-item">
          <div class="cart-head">
            <b>${c.item}</b>
            <span class="cart-price">Rp${rp(c.price)}</span>
          </div>
          <div class="cart-rasa">${c.rasa}</div>
          <button class="cart-remove" onclick="removeCart(${i})">Hapus</button>
        </div>
      `;
    });
  }

  const addOns = getAddOnItems();
  const addOnTotal = getAddOnTotal();
  const addonPreview = document.getElementById("addonPreview");

  if(addOns.length){
    addonPreview.innerHTML = `
      <div class="addon-preview">
        <div class="cart-head">
          <b>Add On</b>
          <span class="cart-price">Rp${rp(addOnTotal)}</span>
        </div>
        <ul>${addOns.map(item => `<li>${escapeHtml(item.desc)} (${item.qty}x) - Rp${rp(item.subtotal)}</li>`).join("")}</ul>
      </div>
    `;
  }else{
    addonPreview.innerHTML = "";
  }

  document.getElementById("cart").innerHTML = html;
  document.getElementById("addonTotal").innerText = rp(addOnTotal);
  document.getElementById("total").innerText = rp(donutTotal + addOnTotal);
}

function removeCart(i){
  cart.splice(i, 1);
  renderCart();
}

function autoMetode(){
  let s = document.getElementById("sumber").value;

  if(["GoFood","GrabFood","ShopeeFood"].includes(s)){
    document.getElementById("metode").value = "Non-Cash (Platform)";
  }else{
    document.getElementById("metode").value = "Cash";
  }
}

async function checkout(){
  if(isCheckingOut) return;

  if(cart.length === 0){
    alert("Keranjang masih kosong!");
    return;
  }

  isCheckingOut = true;
  document.getElementById("payBtn").innerText = "Memproses...";
  document.getElementById("payBtn").disabled = true;

  let donutTotal = cart.reduce((s,c) => s + c.price, 0);
  let addOnTotal = getAddOnTotal();
  let total = donutTotal + addOnTotal;

  let payload = {
    nama: document.getElementById("nama").value || "-",
    sumber: document.getElementById("sumber").value,
    item: cart.map(c => c.item).join(" | "),
    detailRasa: cart.map(c => c.rasa).join(" | "),
    addOn: formatAddOns(),
    harga: cart.map(c => c.price).join(" | "),
    total: total,
    metode: document.getElementById("metode").value,
    totalPcs: cart.reduce((s,c) => s + c.pcs, 0),
    addOnTotal: addOnTotal
  };

  try{
    let res = await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify(payload)
    });

    let data = await res.json();

    if(data.status === "success"){
      let link = data.linkStruk || (STRUK_URL + "?id=" + data.fullID);

      document.getElementById("afterCheckout").innerHTML = `
        <div class="success-box">
          <h2 class="success-title">Order Berhasil</h2>
          <p class="success-note">Order ID: #${orderNo(data.orderID)} / ${data.kodeUnik}</p>
          <div class="success-actions">
            <button class="btn btn-primary" onclick="window.open('${link}', '_blank')">Lihat Struk</button>
            <button class="btn" onclick="navigator.clipboard.writeText('${link}')">Copy Link</button>
          </div>
          <img class="qr" src="https://api.qrserver.com/v1/create-qr-code/?size=140x140&data=${encodeURIComponent(link)}">
        </div>
      `;

      cart = [];
      manualAddOns = [];
      document.getElementById("birthdayPackaging").checked = false;
      document.getElementById("birthdayPrice").value = 0;
      renderManualAddOns();
      renderCart();
      refreshHistoryBadge();

    }else{
      alert("Gagal checkout: " + (data.message || "Unknown error"));
    }

  }catch(err){
    alert("Koneksi gagal: " + err.message);

  }finally{
    isCheckingOut = false;
    document.getElementById("payBtn").innerText = "Bayar";
    document.getElementById("payBtn").disabled = false;
  }
}
</script>

</body>
</html>
